name: Collect RSS news

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:

concurrency:
  group: collect-rss-news
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      NEWS_AUTOMATION_ADMIN_EMAIL: ${{ secrets.NEWS_AUTOMATION_ADMIN_EMAIL }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Collect and publish news
        shell: bash
        run: |
          set +e
          python -m scripts.collect_news
          collection_exit=$?
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json

          if ! git diff --cached --quiet; then
            git commit -m "data: collect latest RSS news"
            git push origin HEAD:main
          fi

          exit "$collection_exit"
